---
layout: default
---

<div class="page">
  <header class="post-header">
    <div class="post-meta">
      <span class="post-tag">{{ page.tag | default: "Experiment" }}</span>
      <span>{{ page.date | date: "%B %-d, %Y" }}</span>
    </div>
    <h1>{{ page.title }}</h1>
    {% if page.description %}<p class="post-desc">{{ page.description }}</p>{% endif %}
  </header>

  <div class="post-body">
    {{ content }}
  </div>
</div>
